name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release
  CMAKE_BUILD_TYPE: ${{ vars.CMAKE_BUILD_TYPE || env.CMAKE_BUILD_TYPE || 'Release' }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        enable_tests: [true, false]
        enable_plugins: [true, false]
        include:
          - os: ubuntu-latest
            enable_tests: true
            enable_plugins: true
            name: Ubuntu Full Test
          - os: ubuntu-latest
            enable_tests: true
            enable_plugins: false
            name: Ubuntu No Plugins
          - os: ubuntu-latest
            enable_tests: false
            enable_plugins: true
            name: Ubuntu Plugins Only
          - os: macos-latest
            enable_tests: true
            enable_plugins: true
            name: macOS Full Test
          - os: windows-latest
            enable_tests: true
            enable_plugins: true
            name: Windows Full Test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DENABLE_TESTS=${{ matrix.enable_tests }} \
            -DENABLE_PLUGINS=${{ matrix.enable_plugins }}
        shell: bash

      - name: Build
        run: |
          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel
        shell: bash

      - name: Run tests
        if: matrix.enable_tests
        working-directory: build
        run: |
          ctest -R "^(string_utils|renderer|critical_fixes|desktop_manager|colors)$" --output-on-failure
        shell: bash

      - name: Run integration tests
        if: matrix.enable_tests && matrix.enable_plugins
        working-directory: build
        run: |
          ctest -R "integration" --output-on-failure
        shell: bash

      - name: Run executable
        run: |
          ./desktop-tui --version
        shell: bash

      - name: Run benchmarks
        if: matrix.enable_tests
        run: |
          ./tests/benchmark
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: desktop-tui-${{ matrix.os }}-${{ matrix.enable_tests }}-${{ matrix.enable_plugins }}
          path: build/

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure CMake with coverage
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_TESTS=ON \
            -DCODE_COVERAGE=ON
        shell: bash

      - name: Build with coverage
        run: |
          cmake --build build --config Debug --parallel
        shell: bash

      - name: Run tests with coverage
        working-directory: build
        run: |
          ctest --output-on-failure
        shell: bash

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./build/coverage.info
          fail_ci_if_error: false

  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup CMake with sanitizers
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_TESTS=ON \
            -DENABLE_ASAN=ON \
            -DENABLE_UBSAN=ON
        shell: bash

      - name: Build with sanitizers
        run: |
          cmake --build build --config Debug --parallel
        shell: bash

      - name: Run tests with sanitizers
        run: |
          ctest --output-on-failure -R "^(string_utils|renderer|critical_fixes)$"
        working-directory: build
        shell: bash

      - name: Upload sanitizer reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sanitizer-reports
          path: build/

  performance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_TESTS=ON
        shell: bash

      - name: Build
        run: |
          cmake --build build --config Release --parallel
        shell: bash

      - name: Run performance benchmarks
        run: |
          ./tests/benchmark
        shell: bash

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-results
          path: build/
